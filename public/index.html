<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>DAGAWA 화상채팅</title>

  <!-- CSS 분리 -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <!-- 상단 영역 -->
    <header class="topbar">
      <div>
        <p class="eyebrow">WEBRTC VIDEO CHAT</p>
        <h1>DAGAWA 화상채팅</h1>
      </div>

      <p id="status" class="status">대기 중...</p>
    </header>

    <!-- 방 입장 영역 -->
    <section class="room-panel">
      <div class="room-input-wrap">
        <label for="roomInput">방 이름</label>
        <input id="roomInput" value="room1" placeholder="방 이름을 입력하세요" />
      </div>
      <button id="leaveBtn" class="leave-btn" disabled>방 나가기</button>
      <button id="joinBtn" class="join-btn">방 입장</button>
    </section>

    <!-- 메인 화상 영역 -->
    <section id="videoStage" class="video-stage">
      <!-- 상대방 큰 화면 -->
      <article id="remoteCard" class="video-card remote-card">
        <video id="remoteVideo" autoplay playsinline></video>

        <div class="video-info">
          <span class="live-dot"></span>
          <span>상대방 화면</span>
        </div>

        <div class="click-guide">큰 화면 클릭 시 전체화면</div>
      </article>

      <!-- 내 화면 작은 화면 -->
      <article id="localCard" class="video-card local-card">
        <video id="localVideo" autoplay playsinline muted></video>

        <div class="video-info">
          <span class="live-dot my-dot"></span>
          <span>내 화면</span>
        </div>

        <div class="click-guide">클릭 시 크게 보기</div>
      </article>

      <aside id="controlPanel" class="control-panel">
        <!-- 작게 접혔을 때 보이는 버튼 -->
        <button id="controlToggleBtn" class="control-toggle-btn" title="오디오 설정">
          <span id="controlToggleIcon">🎚️</span>
        </button>

        <!-- 펼쳤을 때 보이는 설정 내용 -->
        <div class="control-body">
          <div class="control-header">
            <strong>오디오 설정</strong>
            <button id="controlCloseBtn" class="control-close-btn" title="닫기">×</button>
          </div>

          <div class="select-group">
            <label for="micSelect">마이크</label>
            <select id="micSelect">
              <option value="">기본 마이크</option>
            </select>
          </div>

          <div class="select-group">
            <label for="speakerSelect">스피커</label>
            <select id="speakerSelect">
              <option value="">기본 스피커</option>
            </select>
          </div>

          <div class="volume-row">
            <div class="vertical-control">
              <span>상대방</span>
              <input id="remoteVolume" class="vertical-range" type="range" min="0" max="1" step="0.1" value="0.5" />
              <small>소리</small>
            </div>

            <div class="vertical-control">
              <span>내 마이크</span>
              <input id="micVolume" class="vertical-range" type="range" min="0" max="2" step="0.1" value="1" />
              <small>음량</small>
            </div>
          </div>

          <div class="audio-button-row">
            <button id="remoteMuteBtn" class="audio-icon-btn" title="상대방 소리 끄기">
              <span id="remoteMuteIcon">🔊</span>
            </button>

            <button id="muteBtn" class="audio-icon-btn" title="마이크 끄기">
              <span id="muteIcon">🎙️</span>
            </button>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js?v=3"></script>
</body>

</html>
